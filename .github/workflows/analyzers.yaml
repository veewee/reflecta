name: Analyzers

on:
  pull_request: ~
  push: ~
  schedule:
    - cron: '0 9 * * 5'

jobs:
    run:
        runs-on: ${{ matrix.operating-system }}
        strategy:
            matrix:
                operating-system: [ubuntu-latest]
                php-versions: ['8.4', '8.5']
                composer-options: ['--ignore-platform-req=php+']
            fail-fast: false
        name: PHP ${{ matrix.php-versions }} @ ${{ matrix.operating-system }}
        steps:
            - name: Checkout
              uses: actions/checkout@master
            - name: Install PHP
              uses: shivammathur/setup-php@master
              with:
                  php-version: ${{ matrix.php-versions }}
                  tools: 'composer:v2'
                  extensions: pcov, mbstring, posix
            - name: Install dependencies
              run: composer update --ignore-platform-req=php+ --prefer-dist --no-progress --no-suggest ${{ matrix.composer-options }}
            - name: Run the tests
              run: composer run psalm
              continue-on-error: ${{ matrix.php-versions == '8.5' }} # Infection dependency is causing issues.
